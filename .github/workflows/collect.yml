name: Collect Metrics

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: metrics-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ZEROCLAW_METRICS_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Build dashboard
        run: python3 scripts/build_dashboard.py

      - name: Commit updated metrics
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html data/latest.json data/snapshots; then
            echo "No metrics changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/latest.json data/snapshots
          git commit -m "chore(metrics): collect daily snapshot"
          git push
