name: Collect Metrics

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  pages: write
  id-token: write

concurrency:
  group: metrics-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ZEROCLAW_METRICS_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Build dashboard
        run: python3 scripts/build_dashboard.py

      - name: Commit updated metrics
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html data/latest.json data/daily.json data/snapshots; then
            echo "No metrics changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html data/latest.json data/daily.json data/snapshots
            git commit -m "chore(metrics): collect daily snapshot"
            git push
          fi

      - uses: actions/configure-pages@v6

      - name: Stage static dashboard
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp -R data _site/data
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: collect
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
